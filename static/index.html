<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Esteem DocLens</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css?v=editorial7">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
</head>
<body>
  <div class="app-shell">
    <aside class="folder-panel">
      <div class="brand">
        <div class="brand-mark">ED</div>
        <div>
          <div class="brand-name">Esteem DocLens</div>
          <div class="brand-meta">Tender knowledge</div>
        </div>
      </div>

      <div class="folder-tools">
        <button class="primary subtle" id="new-folder-btn">New folder</button>
      </div>

      <div class="folder-search-wrap">
        <input id="folder-search" type="search" placeholder="Find folder">
      </div>

      <div class="rail-label">Folders</div>
      <div id="folder-list" class="folder-list"></div>
    </aside>

    <main class="work-area">
      <header class="topbar">
        <div class="topbar-heading">
          <div class="topbar-kicker">Folder</div>
          <div id="active-folder" class="active-folder">Select a folder</div>
          <div id="folder-stats" class="folder-stats"></div>
        </div>
        <nav class="mode-tabs" aria-label="Main views">
          <button id="ask-tab" class="mode-tab active">Ask</button>
          <button id="check-tab" class="mode-tab">Check</button>
          <button id="documents-tab" class="mode-tab">Documents</button>
          <button id="ingest-tab" class="mode-tab">Ingest</button>
          <button id="jobs-tab" class="mode-tab">Jobs</button>
          <button id="inspect-tab" class="mode-tab hidden">Inspect</button>
        </nav>
        <div class="topbar-user">
          <span id="user-chip" class="user-chip hidden"></span>
          <a id="signout-btn" class="ghost signout hidden" href="#">Sign out</a>
        </div>
      </header>

      <section id="ask-view" class="view ask-view"></section>
      <section id="check-view" class="view page-view hidden"></section>
      <section id="documents-view" class="view page-view hidden"></section>
      <section id="ingest-view" class="view page-view hidden"></section>
      <section id="jobs-view" class="view page-view hidden"></section>
      <section id="inspect-view" class="view page-view hidden"></section>
    </main>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  <script src="/static/app.js?v=editorial7"></script>
</body>
</html>
