<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OCR-RAG Manager</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="layout">
  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-header">
      <h1>OCR-RAG</h1>
      <span class="subtitle">Document Manager</span>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Projects</div>
      <div id="project-list"></div>
      <button class="btn btn-sm btn-outline" onclick="promptNewProject()">+ New Project</button>
    </div>
  </nav>

  <!-- Main content -->
  <div class="main">
    <div id="topbar" class="topbar" style="display:none">
      <div id="breadcrumb" class="breadcrumb"></div>
      <div id="topbar-actions" class="topbar-actions"></div>
    </div>
    <div id="content" class="content">
      <div class="welcome">
        <h2>Welcome</h2>
        <p>Select a project from the sidebar, or create a new one.</p>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div id="modal-overlay" class="modal-overlay" style="display:none" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div id="modal-content"></div>
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
