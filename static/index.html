<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Esteem Folder Knowledge</title>
<link rel="stylesheet" href="/static/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
</head>
<body>

<div class="layout">
  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-header">
      <h1>Esteem</h1>
      <span class="subtitle">Folder Knowledge</span>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Folders</div>
      <div id="project-list"></div>
      <button class="btn btn-sm btn-outline" onclick="promptNewProject()">+ New Folder</button>
    </div>
  </nav>
  <div class="sidebar-resizer" id="sidebar-resizer" aria-hidden="true"></div>

  <!-- Main content -->
  <div class="main">
    <div id="topbar" class="topbar" style="display:none">
      <div id="breadcrumb" class="breadcrumb"></div>
      <div id="topbar-actions" class="topbar-actions"></div>
    </div>
    <div id="content" class="content">
      <div class="welcome">
        <h2>Welcome</h2>
        <p>Select a folder from the sidebar, or create a new one.</p>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div id="modal-overlay" class="modal-overlay" style="display:none" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div id="modal-content"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
